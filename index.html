<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Template</title>
    <style>
        /* Core Reset & Modern Box Sizing */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* System Font Stack: Clean, highly legible, and loads instantly 
           using the device's native premium fonts.
        */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-size: 16px;
            line-height: 1.6;
            color: #333333;
            background-color: #f8f9fa;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Main Container to keep content centered and readable */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Typography Styling Defaults */
        h1, h2, h3, h4, h5, h6 {
            color: #111111;
            font-weight: 700;
            line-height: 1.25;
            margin-bottom: 16px;
        }

        h1 { font-size: 2.5rem; }
        h2 { font-size: 2rem; margin-top: 32px; }
        p { margin-bottom: 20px; }

        /* Smooth transitions for interactive elements */
        a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #004499;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>helooo m, t ko bao giờ sẽ nghĩ là t sẽ làm một cái lưu bút kiểu này đâu:))</h1>
        <hr>
        <img src="upper.png" alt="khung chat">
        <h1>Chúc m thi điểm tốt đậu NV1 FTU, luôn thuận lợi và thành công trên con đường của mình, luôn luôn giữ sức khỏe tốt và hạnh phúc như bây giờ</h1>
        <img src="lower.png" alt="satoru gojo">
    </div>

</body>
</html>
